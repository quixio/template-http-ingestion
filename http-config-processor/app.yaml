name: HTTP Config Processor
language: python
variables:
  - name: input
    inputType: InputTopic
    description: Name of the input topic to listen to.
    defaultValue: input_topic
  - name: output
    inputType: OutputTopic
    multiline: false
    description: Name of the output topic to write to.
    defaultValue: output_topic
  - name: POSTGRES_USER
    inputType: FreeText
    description: The root username to initialize PostgreSQL with
    defaultValue: admin
    required: true
  - name: POSTGRES_PASSWORD
    inputType: Secret
    description: The root password to initialize MongoDB with
    defaultValue: postgresql_password
    required: true
  - name: POSTGRES_DBNAME
    inputType: FreeText
    description: The default database name to initialize PostgreSQL with
    defaultValue: quix
    required: true
dockerfile: dockerfile
runEntryPoint: main.py
defaultFile: main.py
libraryItemId: starter-transformation
